<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#1e3a8a;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.weather-card{
    display:none;
    text-align:center;
    padding:20px;
    background:#f8fafc;
    border-radius:10px;
}

.weather-card h2{
    margin-bottom:15px;
    color:#0f172a;
}

.metric{
    margin:12px 0;
    font-size:18px;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

.loading{
    text-align:center;
    color:#2563eb;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌦 Weather Dashboard</h1>

<div class="search-box">
<input
    type="text"
    id="cityInput"
    placeholder="Enter city name">

<button id="searchBtn">
Search
</button>
</div>

<p class="loading" id="loading"></p>
<p class="error" id="error"></p>

<div class="weather-card" id="weatherCard">

<h2 id="cityName"></h2>

<p class="metric">
🌡 Temperature:
<strong><span id="temp"></span> °C</strong>
</p>

<p class="metric">
💧 Humidity:
<strong><span id="humidity"></span> %</strong>
</p>

<p class="metric">
🌬 Wind Speed:
<strong><span id="wind"></span> m/s</strong>
</p>

<p class="metric">
☁ Condition:
<strong><span id="condition"></span></strong>
</p>

</div>

</div>

<script>

// Your OpenWeatherMap API Key
const API_KEY = "b774f146d6f45a735129b503b7176667";

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");
const weatherCard = document.getElementById("weatherCard");
const errorText = document.getElementById("error");
const loadingText = document.getElementById("loading");

async function getWeather(city){

    try{

        errorText.textContent = "";
        loadingText.textContent = "Loading weather data...";
        weatherCard.style.display = "none";

        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
        );

        if(!response.ok){
            throw new Error("City not found or API error.");
        }

        const data = await response.json();

        document.getElementById("cityName").textContent =
            `${data.name}, ${data.sys.country}`;

        document.getElementById("temp").textContent =
            data.main.temp;

        document.getElementById("humidity").textContent =
            data.main.humidity;

        document.getElementById("wind").textContent =
            data.wind.speed;

        document.getElementById("condition").textContent =
            data.weather[0].description;

        loadingText.textContent = "";
        weatherCard.style.display = "block";

    }
    catch(error){

        loadingText.textContent = "";
        weatherCard.style.display = "none";
        errorText.textContent = error.message;
    }
}

searchBtn.addEventListener("click", () => {

    const city = cityInput.value.trim();

    if(city){
        getWeather(city);
    }
});

cityInput.addEventListener("keypress", (e) => {

    if(e.key === "Enter"){

        const city = cityInput.value.trim();

        if(city){
            getWeather(city);
        }
    }
});

</script>

</body>
</html>
